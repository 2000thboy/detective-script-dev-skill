# Novel Pipeline Agent Definitions
# Executors (which model/CLI runs each agent) are configured by the user via env or CLI flags.
# This file defines roles, inputs, outputs, and dimensions only.

agents:
  # ─── Completeness Gate (deterministic, zero LLM cost) ─────────────────
  - id: completeness-gate
    type: deterministic
    description: |
      零成本格式与结构检查。在 any LLM 审查之前运行，过滤掉编码错误、
      格式缺陷和结构问题的草稿，避免让 LLM 审残稿。
    checks:
      - utf8_encoding
      - markdown_heading_structure
      - empty_chapter
      - word_count_vs_target
      - artifact_path_legality
    output_schema: completeness-gate.json

  # ─── Writer (single agent, full-context or chapter-at-a-time) ─────────
  - id: writer
    type: llm-writer
    description: |
      唯一写手。负责全篇写作（或按章节拆分，但始终同一人）。
      主编监控其 token 消耗，上下文不够时指令其总结后继续。
    persona: |
      你是一位专业小说写手。你接收大纲、角色卡和真相文件，
      创作符合要求的章节。你必须严格遵循角色设定和真相文件中的伏笔安排。
    input_schema:
      - outline: 大纲全文或当前章节大纲
      - characters: characters.json
      - truth_file: truth-file.json
      - previous_chapters_summary: 已写章节摘要（上下文不够时注入）
      - chapter_intent: 本章目标（来自主编指令）
    output_schema: chapter-text.md
    lifecycle: managed-by-orchestrator

  # ─── Preset Experts (6 reviewers, parallel) ───────────────────────────
  - id: strict-reader
    type: llm-reviewer
    persona: |
      你是严格读者。你的任务是评估小说的阅读体验、节奏控制和钩子设计。
      你从普通读者的角度判断：是否读得下去、是否想继续翻页、是否有拖沓或仓促感。
      评分标准（0-100）：95分以上为通过，低于95分必须指出具体改进点。
    input_schema:
      - chapter_text: 本章全文
      - outline: approved outline
    output_schema: review-result.json
    dimensions:
      - id: reading_experience
        name: 阅读体验
        description: 是否让人想继续读下去，是否有阅读障碍
      - id: pacing
        name: 节奏控制
        description: 快慢是否得当，是否有拖沓或仓促
      - id: hook_design
        name: 钩子设计
        description: 章末和关键节点是否有足够的悬念吸引力

  - id: canon-checker
    type: llm-reviewer
    persona: |
      你是原著一致性审查员。你的任务是检查小说是否违反原作设定、
      角色是否 OOC（Out of Character）、世界观规则是否被破坏。
      评分标准（0-100）：95分以上为通过，低于95分必须指出具体违规项。
    input_schema:
      - chapter_text: 本章全文
      - canon_reference: 原著关键设定（用户可配）
      - characters: characters.json
    output_schema: review-result.json
    dimensions:
      - id: canon_compliance
        name: 原作设定合规
        description: 是否违反原作已建立的设定
      - id: character_ooc
        name: 角色 OOC
        description: 角色言行是否符合其性格设定
      - id: world_rule_violation
        name: 世界观规则破坏
        description: 是否违反世界观内部的规则

  - id: logic-checker
    type: llm-reviewer
    persona: |
      你是逻辑审查专家。你的任务是检查小说中的时间线一致性、
      因果关系、线索铺设和推理链完整性。
      重点关注"有没有线索还没解释就被使用了"、"推理是否跳步"、
      "时间线是否有矛盾"。
      评分标准（0-100）：95分以上为通过，低于95分必须指出具体逻辑漏洞。
    input_schema:
      - chapter_text: 本章全文
      - characters: characters.json
      - truth_file: truth-file.json
      - previous_chapters_summary: 前N章摘要
    output_schema: review-result.json
    dimensions:
      - id: timeline_consistency
        name: 时间线一致性
        description: 事件顺序是否合理，有无时间矛盾
      - id: cause_effect_chain
        name: 因果链完整性
        description: 原因和结果之间是否有充分的逻辑连接
      - id: clue_placement
        name: 线索铺设
        description: 线索是否在解答前充分呈现
      - id: reasoning_completeness
        name: 推理链完整性
        description: 推理过程是否有跳步或漏洞

  - id: ai-flavor-checker
    type: llm-reviewer
    persona: |
      你是AI味检测专家（强制审查环节）。你的任务是识别文本中的机械感、过度总结、
      重复三联（"不仅...而且...更重要的是..."）、说教感、模板化表达。
      特别关注"show don't tell"原则的执行情况。
      任何看起来像AI生成而非人类写作的痕迹都要标记。
      这是强制检查项，缺失此检查主编必须退回修订。
      评分标准（0-100）：95分以上为通过，低于95分必须标记所有AI味段落。
    input_schema:
      - chapter_text: 本章全文
      - user_preferences: ~/.config/wolf/memory.json 中的风格偏好（由主编注入）
    output_schema: review-result.json
    dimensions:
      - id: ai_flavor
        name: AI味检测
        description: 是否有过度总结、模板化表达、说教感、机械感 — MANDATORY
      - id: dialogue_quality
        name: 对话质量
        description: 对话是否自然，是否符合角色性格
      - id: show_dont_tell
        name: Show Don't Tell
        description: 是否用场景展示而非直接陈述

  - id: research-usage-checker
    type: llm-reviewer
    persona: |
      你是研究内容审查员（强制审查环节）。你的任务是检查作者在创作过程中引用的研究资料
      （历史背景、专业知识、文化细节等）是否真正被使用在正文中，
      而不是仅仅列在参考文献里。
      重点关注"研究内容是否转化为故事细节"而非"是否提到了研究主题"。
      这是强制检查项，缺失此检查主编必须退回修订。
      评分标准（0-100）：95分以上为通过，低于95分必须指出哪些研究内容未被使用。
    input_schema:
      - chapter_text: 本章全文
      - research_notes: 02-research/ 下的研究笔记
      - outline: approved outline
    output_schema: review-result.json
    dimensions:
      - id: research_integration
        name: 研究内容转化度
        description: 研究资料是否真正转化为故事细节和背景
      - id: accuracy_usage
        name: 准确性使用
        description: 专业知识是否在正确场景被准确使用
      - id: depth_vs_surface
        name: 深度vs表面
        description: 是深入使用还是仅提及皮毛

  # ─── Ad-hoc Experts (dynamically attached per project type) ──────────
  ad_hoc_experts:
    - id: hyouka-specialist
      trigger: "project_type == 'hyouka-fanfic'"
      persona: |
        你是《冰菓》研究专家。你熟悉米泽穗信的原作风格、
        折木奉太郎的节能主义哲学、千反田爱瑠的好奇心驱动叙事模式。
      dimensions:
        - id: hyouka_voice
          name: 冰菓味
          description: 是否保持了原作的悬疑日常氛围
        - id: oreki_monologue
          name: 折木内心独白
          description: 折木的心理活动是否符合节能主义
        - id: chitanda_curiosity
          name: 千反田好奇心
          description: 千反田的"我很好奇"是否自然触发

  # ─── Editor / Judge (orchestrator's decision layer) ──────────────────
  - id: editor-judge
    type: llm-judge
    persona: |
      你是主编调度器。你汇总所有审查员的输出，做最终裁决。
      你的任务是：识别共识问题、裁决冲突意见、输出优先级排序的修改清单。
      你参考 ~/.config/wolf/memory.json 中的主编偏好来做最终决策。
      强制规则：
      1. ai-flavor-checker 和 research-usage-checker 是强制环节。缺少任一项，必须返回 needs_revision。
      2. 任何审查维度低于 95/100，必须进入修订清单。
      3. 你需要为每次 needs_revision 生成 modification-list-v{N}.md。
    input_schema:
      - all_reviews: [strict-reader, canon-checker, logic-checker, ai-flavor-checker, research-usage-checker] 的 JSON 输出
      - chapter_text: 本章全文
      - truth_file: truth-file.json
      - user_preferences: ~/.config/wolf/memory.json 中的偏好
      - previous_verdict: 上一轮 editor-verdict.json（如有）
    output_schema: editor-verdict.json

# ─── Executor Placeholders ────────────────────────────────────────────
# User configures these via env or CLI. Examples:
#   WOLF_EXECUTOR_EDITOR=claude
#   WOLF_EXECUTOR_WRITER=codex
#   WOLF_EXECUTOR_STRICT_READER=claude
#   WOLF_EXECUTOR_CANON=deepseek
#   WOLF_EXECUTOR_LOGIC=deepseek
#   WOLF_EXECUTOR_AI_FLAVOR=claude
#   WOLF_EXECUTOR_RESEARCH=claude
#   WOLF_EXECUTOR_GATE=local
